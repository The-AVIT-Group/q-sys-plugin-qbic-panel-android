name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Restore debug keystore
        run: |
          mkdir -p ~/.android
          echo "${{ secrets.ANDROID_DEBUG_KEYSTORE_B64 }}" | base64 -d > ~/.android/debug.keystore

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk QbicControl.apk

      - name: Create install zip
        run: |
          set -e
          for f in QbicControl.apk commission_panel.ps1 \
                    privapp-permissions-qbiccontrol.xml \
                    qbiccontrol-permissions.xml INSTALL.md; do
            [ -f "$f" ] || { echo "ERROR: $f not found"; exit 1; }
          done
          zip "QbicControl-${{ github.ref_name }}.zip" \
            QbicControl.apk \
            commission_panel.ps1 \
            privapp-permissions-qbiccontrol.xml \
            qbiccontrol-permissions.xml \
            INSTALL.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "QbicControl-${{ github.ref_name }}.zip" \
            --title "${{ github.ref_name }}" \
            --notes-from-tag
